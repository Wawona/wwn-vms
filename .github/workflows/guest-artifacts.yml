name: Guest artifacts

# Builds the aarch64-linux NixOS guest (kernel + ext4 rootfs) for the mobile
# QEMU-TCTI engine on GitHub's native arm64 runners.
#
# Why CI and not the macOS host: the Determinate native Linux builder shares
# /nix/store into its VM over virtiofs. On a case-insensitive APFS store the
# case hack (`l~nix~case~hack~1` etc., e.g. in ncurses terminfo) is visible to
# the Linux guest as raw names, which breaks make-initrd-ng and would silently
# poison any rootfs image copied from that view (NixOS/nix#9319). A real
# case-sensitive Linux builder is the only sound producer for these images.

on:
  push:
    branches: [ main ]
    paths:
      - flake.nix
      - flake.lock
      - dependencies/vms/mobile/**
      - .github/workflows/guest-artifacts.yml
  workflow_dispatch: {}

jobs:
  mobile-guest-artifacts:
    name: wawona-mobile-guest-artifacts (aarch64-linux)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: true
          # GitHub arm64 runners have no /dev/kvm, but make-disk-image only
          # *declares* requiredSystemFeatures = ["kvm"]; the aarch64 qemu
          # invocation uses accel=kvm:tcg and falls back to TCG. Advertise the
          # feature so Nix schedules the image build.
          extra-conf: |
            extra-system-features = kvm

      - name: KVM diagnostics
        run: ls -l /dev/kvm || echo "no /dev/kvm; image build will use TCG (accel=kvm:tcg fallback)"

      - name: Build guest artifacts
        run: nix build .#packages.aarch64-linux.wawona-mobile-guest-artifacts -L

      - name: Stage artifacts (dereference store symlinks)
        run: |
          mkdir -p dist/wawona-mobile-guest
          cp -RL result/. dist/wawona-mobile-guest/
          chmod -R u+w dist/wawona-mobile-guest
          ls -lh dist/wawona-mobile-guest

      - uses: actions/upload-artifact@v4
        with:
          name: wawona-mobile-guest-artifacts
          path: dist/wawona-mobile-guest
          if-no-files-found: error
